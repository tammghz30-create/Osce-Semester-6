<!DOCTYPE html>
<html>
<head>
    <title>Dashboard OSCE Checklist</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f6f9;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 40px;
        }
        /* Mengatur pembungkus tombol-tombol menu */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto; /* Agar menu berada di tengah layar */
        }
        /* Mengubah link/tautan biasa menjadi berbentuk tombol (Card) */
        .menu-card {
            display: block;
            background-color: white;
            color: #34495e;
            text-decoration: none; /* Menghilangkan garis bawah link */
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }
        /* Efek saat tombol disentuh atau diarahkan kursor */
        .menu-card:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-2px); /* Efek sedikit terangkat */
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.2);
        }
    </style>
</head>
<body>

    <h1>Checklist OSCE</h1>
    <p>Silakan pilih keterampilan klinik yang akan diuji:</p>

    <div class="menu-container">
        <a href="basic-life-support.html" class="menu-card"> Basic Life Support</a>
        <a href="pemasangan-iud.html" class="menu-card"> Pemasangan IUD</a>
        <a href="pemeriksaan-fisik-abdomen.html" class="menu-card"> Pemeriksaan Fisik Abdomen</a>
        <a href="pemeriksaan-visus.html" class="menu-card">Pemeriksaan Visus</a>
    </div>

</body>
</html>
